<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Slides NoBanana</title>
  </head>
  <body>
    <header class="header">
      <img src="../icons/icon48.png" alt="" width="28" height="28" />
      <div>
        <h1>Slides NoBanana</h1>
        <p class="sub">「Beautify this slide」ボタンを非表示</p>
      </div>
    </header>

    <label class="row toggle">
      <span>拡張機能を有効にする</span>
      <input type="checkbox" id="enabled" />
      <span class="switch" aria-hidden="true"></span>
    </label>

    <label class="row toggle">
      <span>標準ラベルで自動的に消す</span>
      <input type="checkbox" id="useBuiltin" />
      <span class="switch" aria-hidden="true"></span>
    </label>

    <div class="pick-block">
      <button id="pick" class="primary">ボタンを選択して消す</button>
      <p class="hint">
        ラベルが分からなくても確実に消せます。押した後、Google
        スライドのタブに戻り、消したいボタンを 1 回クリックしてください。
      </p>
      <p id="pickStatus" class="pickStatus" hidden></p>
    </div>

    <div class="row footer">
      <span id="customCount" class="count"></span>
      <button id="openOptions" class="link">詳細設定</button>
    </div>

    <p id="notSlides" class="warn" hidden>
      Google スライドのタブを開いてから使用してください。
    </p>

    <script src="defaults.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
